name: Scrape eTender

on:
  # Run automatically every day at 08:00 Baku time (UTC+4 = 04:00 UTC)
  schedule:
    - cron: '0 4 * * *'

  # Run manually from GitHub Actions tab (lets you set keyword/dates)
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Search keyword (leave blank for default from config.json)'
        required: false
        default: ''
      date_from:
        description: 'Date from (YYYY-MM-DD, leave blank for default)'
        required: false
        default: ''
      date_to:
        description: 'Date to (YYYY-MM-DD, leave blank for default)'
        required: false
        default: ''
      max_pages:
        description: 'Max pages to scrape'
        required: false
        default: '10'

permissions:
  contents: write   # needed to commit data/tenders.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        env:
          KEYWORD:   ${{ github.event.inputs.keyword   || '' }}
          DATE_FROM: ${{ github.event.inputs.date_from || '' }}
          DATE_TO:   ${{ github.event.inputs.date_to   || '' }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '10' }}
        run: python scraper.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tenders.json
          git diff --cached --quiet || git commit -m "chore: update tenders $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
